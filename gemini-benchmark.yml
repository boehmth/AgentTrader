name: Gemini Benchmark

# Läuft auf github.com öffentlichen Runnern.
# Nur Gemini als Provider — kein SAP GenAI Hub!
#
# Erforderliche Secrets (Repo → Settings → Secrets and variables → Actions):
#   GOOGLE_API_KEY

on:
  # werktags 20:00 UTC
  schedule:
    - cron: "0 20 * * 1-5"
  # manueller Trigger via GitHub-UI
  workflow_dispatch:
    inputs:
      days:
        description: "Simulations-Tage rückwärts"
        required: false
        default: "5"
      prompt_version:
        description: "Prompt-Version (v1..v6)"
        required: false
        default: "v6"
      models:
        description: "Komma-separierte Gemini-Modelle"
        required: false
        default: "gemini-2.5-flash"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: gemini-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Google API key
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "ERROR: secret GOOGLE_API_KEY is not set."
            exit 1
          fi
          echo "GOOGLE_API_KEY is set (length: ${#GOOGLE_API_KEY})"

      - name: Run Gemini benchmark
        env:
          PYTHONIOENCODING: utf-8
          LLM_PROVIDER: gemini
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PROMPT_VERSION: ${{ github.event.inputs.prompt_version || 'v6' }}
          TICKERS: NVDA,MSFT,JPM,KO,JNJ,XOM,WMT,DIS
        run: |
          DAYS="${{ github.event.inputs.days || '5' }}"
          MODELS="${{ github.event.inputs.models || 'gemini-2.5-flash' }}"
          python benchmark.py --days "$DAYS" --models "$MODELS"

      - name: Build HTML report
        run: |
          python report.py --leaderboard data/leaderboard.csv --out docs/index.html

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/ docs/ || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "gemini benchmark: $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      # ------------------------------------------------------------------
      # GitHub Pages Deployment (optional / best-effort)
      # ------------------------------------------------------------------
      # HINWEIS: Damit dieser Block funktioniert, muss Pages im Repo einmalig
      # manuell aktiviert werden:
      #   Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
      # Der Parameter `enablement: true` reicht NICHT aus, weil das
      # Standard-GITHUB_TOKEN nicht das Recht `administration: write` hat,
      # das zum Anlegen einer Pages-Site nötig wäre.
      #
      # Solange Pages nicht aktiviert ist, überspringen wir die Steps
      # bzw. lassen sie den Job nicht rot färben.

      - name: Setup Pages
        id: pages_setup
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload Pages artifact
        if: steps.pages_setup.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.pages_setup.outcome == 'success'
        uses: actions/deploy-pages@v4
        continue-on-error: true
