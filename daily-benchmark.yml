name: Daily Benchmark

on:
  # Täglich um 20:00 UTC (US-Handelsschluss + Puffer)
  schedule:
    - cron: "0 20 * * 1-5"
  # Manueller Trigger
  workflow_dispatch:
    inputs:
      days:
        description: "Simulations-Tage rückwärts"
        required: false
        default: "5"
      prompt_version:
        description: "Prompt-Version (v1..v6)"
        required: false
        default: "v6"
      models:
        description: "Komma-separierte Modelle (leer = default)"
        required: false
        default: ""

permissions:
  contents: write     # zum Zurückcommitten der Ergebnisse
  pages: write        # zum Deployen auf GitHub Pages
  id-token: write

concurrency:
  group: daily-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write SAP service key
        env:
          SAP_KEY: ${{ secrets.SAP_GENAI_SERVICE_KEY_JSON }}
        run: |
          if [ -z "$SAP_KEY" ]; then
            echo "ERROR: secret SAP_GENAI_SERVICE_KEY_JSON is not set."
            exit 1
          fi
          printf '%s' "$SAP_KEY" > .sap_service_key.json
          chmod 600 .sap_service_key.json

      - name: Run benchmark
        env:
          PYTHONIOENCODING: utf-8
          LLM_PROVIDER: sap
          SAP_GENAI_SERVICE_KEY_FILE: ./.sap_service_key.json
          SAP_GENAI_RESOURCE_GROUP: default
          PROMPT_VERSION: ${{ github.event.inputs.prompt_version || 'v6' }}
          TICKERS: NVDA,MSFT,JPM,KO,JNJ,XOM,WMT,DIS
        run: |
          DAYS="${{ github.event.inputs.days || '5' }}"
          MODELS="${{ github.event.inputs.models }}"
          if [ -n "$MODELS" ]; then
            python benchmark.py --days "$DAYS" --models "$MODELS"
          else
            python benchmark.py --days "$DAYS"
          fi

      - name: Build HTML report
        run: |
          python report.py --leaderboard data/leaderboard.csv --out docs/index.html

      - name: Clean up service key
        if: always()
        run: rm -f .sap_service_key.json

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/ docs/ || true
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "benchmark: $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true    # Aktiviert Pages automatisch, falls es noch aus ist.

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true   # Falls Pages noch nicht bereit: kein harter Fail.
